<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>실시간 위치 지도</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:transparent;
}

#map{
width:100vw;
height:100vh;
}

.panel{

position:absolute;

left:15px;
top:15px;

width:320px;

padding:16px;

border-radius:20px;

background:
rgba(255,255,255,0.82);

backdrop-filter:blur(12px);

box-shadow:
0 4px 20px rgba(0,0,0,0.2);

z-index:9999;

}

#time{

font-size:15px;
font-weight:bold;

color:#03c75a;

line-height:1.5;

margin-bottom:12px;

}

.title{

font-size:24px;
font-weight:bold;

margin-bottom:10px;

color:#111;

}

.addr{

font-size:20px;
font-weight:bold;

line-height:1.4;

margin-bottom:14px;

color:#111;

}

.leaflet-control-attribution{
display:none;
}

.leaflet-control-zoom{
display:none;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="panel">

<div id="time">
시간 불러오는중...
</div>

<div class="title">
📍 현재 위치
</div>

<div
class="addr"
id="addr"
>
좌표 대기중...
</div>

</div>

<script src=
"https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script>

const addr =
document.getElementById(
"addr"
);

const time =
document.getElementById(
"time"
);

function updateTime(){

const now = new Date();

const days = [
'일요일',
'월요일',
'화요일',
'수요일',
'목요일',
'금요일',
'토요일'
];

time.innerHTML =

`${now.getFullYear()}년
${now.getMonth()+1}월
${now.getDate()}일
${days[now.getDay()]}
<br>
${now.toLocaleTimeString()}`;

}

setInterval(updateTime,1000);

updateTime();

function getQuery(name){

const url =
new URL(window.location.href);

return url.searchParams.get(name);

}

const lat =
parseFloat(getQuery('lat'))
|| 37.5665;

const lng =
parseFloat(getQuery('lng'))
|| 126.9780;

const map = L.map(
'map',
{
zoomControl:false
}
).setView(
[lat,lng],
16
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

const marker =
L.circleMarker(
[lat,lng],
{
radius:10,
color:'#fff',
weight:4,
fillColor:'#2A7FFF',
fillOpacity:1
}
).addTo(map);

async function updateAddress(){

try{

const res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
);

const data =
await res.json();

const city =
data.address.city ||
data.address.town ||
'서울';

const suburb =
data.address.suburb ||
data.address.neighbourhood ||
'';

addr.innerHTML =
`${city} ${suburb}`;

}catch(e){

addr.innerHTML =
'주소 확인 실패';

}

}

updateAddress();

</script>

</body>
</html>
