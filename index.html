<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>네이버 스타일 실시간 위치 (RTIRL 연동)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
*{ box-sizing:border-box; }
body{ margin:0; overflow:hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:transparent; }
#map{ width:100vw; height:100vh; }
.overlay{ position:fixed; left:20px; top:20px; width:320px; padding:18px; border-radius:24px; background: rgba(255,255,255,0.82); backdrop-filter:blur(12px); -webkit-backdrop-filter: blur(12px); box-shadow: 0 6px 30px rgba(0,0,0,0.18); border: 1px solid rgba(255,255,255,0.5); z-index:9999; }
#time{ font-size:15px; font-weight:700; line-height:1.5; color:#03c75a; margin-bottom:16px; }
.line{ height:1px; background:#ddd; margin-bottom:18px; }
.title{ display:flex; align-items:center; font-size:20px; font-weight:800; color:#111; margin-bottom:10px; }
.icon{ font-size:28px; margin-right:8px; color:#03c75a; }
.address{ font-size:22px; font-weight:800; line-height:1.4; color:#111; margin-bottom:18px; }
#miniMap{ width:100%; height:250px; border-radius:18px; overflow:hidden; }
.leaflet-control-attribution{ display:none; }
.leaflet-control-zoom{ display:none; }
</style>
</head>

<body>

<div id="map"></div>

<div class="overlay">
    <div id="time">시간 불러오는중...</div>
    <div class="line"></div>
    <div class="title">
        <div class="icon">📍</div>
        현재 위치
    </div>
    <div class="address" id="address">GPS 신호 대기 중...</div>
    <div id="miniMap"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ⭐ [필수 수정] RTIRL 로그인 후 상단이나 설정에서 확인 가능한 본인의 고유 ID(또는 주소창의 key값)를 입력하세요.
const RTIRL_ID = '여기에_RTIRL_ID를_넣으세요'; 

const address = document.getElementById("address");
const time = document.getElementById("time");

// 1. 시간 업데이트 기능
function updateTime(){
    const now = new Date();
    const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
    const text = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}<br>${now.toLocaleTimeString()}`;
    time.innerHTML = text;
}
setInterval(updateTime, 1000);
updateTime();

// 2. 지도 및 마커 초기화 (기본값 서울시청)
const map = L.map('miniMap', { zoomControl:false }).setView([37.5665, 126.9780], 16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const marker = L.circleMarker([37.5665, 126.9780], {
    radius: 10, color:'#fff', weight:4, fillColor:'#2A7FFF', fillOpacity:1
}).addTo(map);

// 3. 주소 변환 기능 (Reverse Geocoding)
let lastLat = 0;
let lastLng = 0;

async function updateAddress(lat, lng){
    // 위치 변화가 거의 없으면 불필요한 호출 방지
    if(Math.abs(lastLat - lat) < 0.0001 && Math.abs(lastLng - lng) < 0.0001) return;
    lastLat = lat;
    lastLng = lng;

    try{
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
        const data = await res.json();
        
        // 동/읍/면 단위 추출 최적화
        const city = data.address.city || data.address.town || data.address.borough || '';
        const suburb = data.address.suburb || data.address.neighbourhood || data.address.village || '';
        
        if(!city && !suburb) {
            address.innerHTML = data.display_name.split(',')[1] || '위치 파악 완료';
        } else {
            address.innerHTML = `${city} ${suburb}`.trim();
        }
    }catch(e){
        address.innerHTML = '주소 확인 실패';
    }
}

// 4. ⭐ 핵심: RTIRL 서버에서 내 위치 가져오기 (watchPosition 대체)
async function getRTIRLLocation() {
    if(RTIRL_ID === 'woozoo74') {
        address.innerHTML = "RTIRL ID 설정 필요";
        return;
    }

    try {
        // RTIRL 최신 위치 데이터 API 호출
        const response = await fetch(`https://api.rtirl.com/location/${RTIRL_ID}`);
        if (!response.ok) throw new Error();
        
        const data = await response.json();
        
        if (data && data.latitude && data.longitude) {
            const lat = data.latitude;
            const lng = data.longitude;

            // 지도 및 마커 실시간 이동
            map.setView([lat, lng], 16, { animate: true });
            marker.setLatLng([lat, lng]);

            // 동네 주소 갱신
            await updateAddress(lat, lng);
        }
    } catch (error) {
        // 서버 연결 실패나 데이터가 없을 때 디자인이 깨지지 않도록 유지
        console.log("RTIRL 데이터 로드 실패 또는 대기 중...");
    }
}

// 2초마다 RTIRL 서버에 위치 물어보기
setInterval(getRTIRLLocation, 2000);
getRTIRLLocation();

</script>

</body>
</html>
