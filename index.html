let totalDistance = 0;

function calculateDistance(lat1,lng1,lat2,lng2){

const R = 6371;

const dLat =
(lat2-lat1) * Math.PI/180;

const dLng =
(lng2-lng1) * Math.PI/180;

const a =
Math.sin(dLat/2) *
Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLng/2) *
Math.sin(dLng/2);

const c =
2 * Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

async function updateAddress(lat,lng){

} else if (addr.city && !siGunGu) {
    siGunGu = addr.city;
}

const dongCandidates = [
    addr.suburb, 
    addr.quarter, 
    addr.neighbourhood, 
    addr.town, 
    addr.village
];

    fullAddress += siGunGu + ' ';
}

if (dong && !fullAddress.includes(dong) && !siGunGu.includes(dong)) {
    fullAddress += dong;

}

// 주소가 완벽히 비어있을 때의 예외 처리

}

`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m`
);

await weatherRes.json();

weatherData.current.temperature_2m;

tempText.innerHTML =
`${temp}°C`;

}catch(e){

address.innerHTML =
'주소 확인 실패';
