<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>배달 라이브 지도</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:transparent;
}

.panel{

position:absolute;

left:15px;
bottom:15px;

width:320px;

background:rgba(0,0,0,0.75);

color:white;

padding:15px;

border-radius:18px;

z-index:999;
}

.title{

font-size:24px;
font-weight:bold;
margin-bottom:10px;

}

.addr{

font-size:20px;
line-height:1.4;
margin-bottom:10px;

}

#map{

width:100%;
height:220px;

border-radius:12px;

}

.live{

margin-top:10px;

font-size:18px;
font-weight:bold;

color:#00ff99;

}

</style>
</head>

<body>

<div class="panel">

<div class="title">
📍 현재 위치
</div>

<div class="addr" id="addr">
위치 확인중...
</div>

<div id="map"></div>

<div class="live">
🏍 오토바이 이동중...
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const addr = document.getElementById("addr");

const map = L.map('map').setView([37.5665,126.9780],15);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

const marker =
L.marker([37.5665,126.9780]).addTo(map);

navigator.geolocation.watchPosition(

async(pos)=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

map.setView([lat,lng],17);

marker.setLatLng([lat,lng]);

const res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
);

const data = await res.json();

addr.innerHTML =
(data.address.suburb || "") + "<br>" +
(data.address.road || "");

},

()=>{

addr.innerHTML="위치 권한 허용 필요";

},

{
enableHighAccuracy:true
}

);

</script>

</body>
</html>
