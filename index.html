<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>배달 라이브 네이버지도 스타일</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:rgba(0,0,0,0);
}

#map{
    width:100vw;
    height:100vh;
    opacity:0.92;
    filter:saturate(1.05) contrast(1.02);
}

.overlay{
    position:fixed;
    left:18px;
    bottom:18px;

    width:340px;

    background:rgba(255,255,255,0.72);

    border-radius:28px;

    padding:18px;

    border:1px solid rgba(255,255,255,0.45);

    z-index:9999;

    box-shadow:
    0 10px 35px rgba(0,0,0,0.18);

    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
}

.top{
    display:flex;
    align-items:center;
    gap:10px;

    margin-bottom:12px;
}

.dot{
    width:14px;
    height:14px;

    border-radius:50%;

    background:#03c75a;

    box-shadow:0 0 12px rgba(3,199,90,0.7);

    animation:blink 1.2s infinite;
}

@keyframes blink{

0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}

}

.title{
    font-size:24px;
    font-weight:800;

    color:#111111;
}

.address{
    font-size:21px;
    line-height:1.5;

    color:#222222;

    margin-bottom:14px;

    font-weight:700;
}

.map-box{
    overflow:hidden;
    border-radius:18px;
}

.moving{
    margin-top:14px;

    background:#03c75a;

    color:white;

    font-size:18px;
    font-weight:bold;

    padding:12px;

    border-radius:14px;

    text-align:center;
}

.speed{
    margin-top:10px;

    font-size:18px;
    font-weight:bold;

    color:#03c75a;
}

.leaflet-control-attribution{
    display:none;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.12);}
100%{transform:scale(1);}
}

</style>
</head>
<body>

<div id="map"></div>

<div class="overlay">

<div id="datetime" style="
font-size:17px;
font-weight:bold;
color:#03c75a;
margin-bottom:10px;
">
2026년 5월 27일 수요일 23:00
</div>

<div class="top">
<div class="dot"></div>
<div class="title">네이버 지도 실시간 위치</div>
</div>

<div class="address" id="address">
위치 불러오는 중...
</div>

<div class="map-box">
</div>

<div class="moving">
🏍 오토바이 이동중...
</div>

<div class="speed" id="speed">
현재 속도 0 km/h
</div>

<div class="speed" id="maxSpeed" style="margin-top:6px; color:#111;">
최고 속도 0 km/h
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const datetimeText = document.getElementById('datetime');
const addressText = document.getElementById('address');
const speedText = document.getElementById('speed');
const maxSpeedText = document.getElementById('maxSpeed');

let maxSpeed = 0;

document.body.style.background = 'transparent';

const map = L.map('map',{
    zoomControl:false
}).setView([37.5665,126.9780],16);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

const markerIcon = L.divIcon({
    html:`
    <div style="
    animation:pulse 1.5s infinite;

    width:26px;
    height:26px;
    background:#03c75a;
    border:5px solid white;
    border-radius:50%;
    box-shadow:0 0 18px rgba(3,199,90,0.7);
    "></div>
    `,
    className:'',
    iconSize:[26,26]
});

const marker = L.marker(
[37.5665,126.9780],
{icon:markerIcon}
).addTo(map);

async function updateAddress(lat,lng){

try{

const res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
);

const data = await res.json();

const city =
    data.address.city ||
    data.address.town ||
    data.address.county ||
    '서울';

const suburb =
    data.address.suburb ||
    data.address.neighbourhood ||
    '';

const road =
    data.address.road ||
    '';

addressText.innerHTML = `📍 현재 위치
${city}<br>${suburb} ${road}`;

}catch(e){

addressText.innerHTML = '주소 확인 실패';

}

}

function updateDateTime(){

const now = new Date();

const days = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

const year = now.getFullYear();
const month = now.getMonth() + 1;
const date = now.getDate();
const day = days[now.getDay()];

let hour = now.getHours();
let min = now.getMinutes();
let sec = now.getSeconds();

hour = String(hour).padStart(2,'0');
min = String(min).padStart(2,'0');
sec = String(sec).padStart(2,'0');

datetimeText.innerHTML =
`${year}년 ${month}월 ${date}일 ${day}<br>${hour}:${min}:${sec}`;

}

setInterval(updateDateTime,1000);
updateDateTime();

navigator.geolocation.watchPosition(

async(position)=>{

const lat = position.coords.latitude;
const lng = position.coords.longitude;

map.setView([lat,lng],18,{
    animate:true
});

marker.setLatLng([lat,lng]);

await updateAddress(lat,lng);

let speed = position.coords.speed;

if(speed === null || speed < 1){

speedText.innerHTML = '현재 속도 0 km/h';

}else{

speed = Math.round(speed * 3.6);

if(speed > maxSpeed){
    maxSpeed = speed;
}

speedText.innerHTML = `현재 속도 ${speed} km/h`;

maxSpeedText.innerHTML = `최고 속도 ${maxSpeed} km/h`;

}

},

()=>{

addressText.innerHTML = '위치 권한 허용 필요';

},

{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:5000
}

);

</script>
</body>
</html>
