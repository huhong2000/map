<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>네이버 스타일 실시간 위치</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
overflow:hidden;
font-family:
-apple-system,
BlinkMacSystemFont,
'Segoe UI',
sans-serif;

background:transparent;
}

#map{
width:100vw;
height:100vh;
}

.overlay{

position:fixed;

left:20px;
top:20px;

width:320px;

padding:18px;

border-radius:24px;

background:
rgba(255,255,255,0.82);

backdrop-filter:blur(12px);

-webkit-backdrop-filter:
blur(12px);

box-shadow:
0 6px 30px rgba(0,0,0,0.18);

border:
1px solid rgba(255,255,255,0.5);

z-index:9999;

}

#time{

font-size:15px;
font-weight:700;

line-height:1.5;

color:#03c75a;

margin-bottom:16px;

}

.line{

height:1px;

background:#ddd;

margin-bottom:18px;

}

.title{

display:flex;
align-items:center;

font-size:20px;
font-weight:800;

color:#111;

margin-bottom:10px;

}

.icon{

font-size:28px;

margin-right:8px;

color:#03c75a;

}

.address{

font-size:22px;
font-weight:800;

line-height:1.4;

color:#111;

margin-bottom:18px;

}

#miniMap{

width:100%;
height:250px;

border-radius:18px;

overflow:hidden;

}

.leaflet-control-attribution{
display:none;
}

.leaflet-control-zoom{
display:none;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="overlay">

<div id="time">
시간 불러오는중...
</div>

<div class="line"></div>

<div class="title">
<div class="icon">📍</div>
현재 위치
</div>

<div
class="address"
id="address"
>
서울 강남구 역삼동
</div>

<div id="miniMap"></div>

</div>

<script src=
"https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script>

const address =
document.getElementById(
"address"
);

const time =
document.getElementById(
"time"
);

function updateTime(){

const now = new Date();

const days = [
'일요일',
'월요일',
'화요일',
'수요일',
'목요일',
'금요일',
'토요일'
];

const text =

`${now.getFullYear()}년
${now.getMonth()+1}월
${now.getDate()}일
${days[now.getDay()]}
<br>
${now.toLocaleTimeString()}`;

time.innerHTML = text;

}

setInterval(updateTime,1000);

updateTime();

const map = L.map(
'miniMap',
{
zoomControl:false
}
).setView(
[37.5665,126.9780],
16
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

const marker = L.circleMarker(
[37.5665,126.9780],
{
radius:10,
color:'#fff',
weight:4,
fillColor:'#2A7FFF',
fillOpacity:1
}
).addTo(map);

async function updateAddress(
lat,
lng
){

try{

const res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
);

const data =
await res.json();

const city =
data.address.city ||
data.address.town ||
'서울';

const suburb =
data.address.suburb ||
data.address.neighbourhood ||
'';

address.innerHTML =
`${city} ${suburb}`;

}catch(e){

address.innerHTML =
'주소 확인 실패';

}

}

navigator.geolocation.watchPosition(

async(pos)=>{

const lat =
pos.coords.latitude;

const lng =
pos.coords.longitude;

map.setView(
[lat,lng],
17,
{
animate:true
}
);

marker.setLatLng(
[lat,lng]
);

await updateAddress(
lat,
lng
);

},

()=>{

address.innerHTML =
'위치 권한 허용 필요';

},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:5000
}

);

</script>

</body>
</html>
