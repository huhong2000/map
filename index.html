<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RTIRL 실시간 위치</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

<style>

html,body{
margin:0;
padding:0;
background:#f5f5f5;
font-family:sans-serif;
}

.wrap{
width:340px;
margin:20px auto;
background:#fff;
border-radius:24px;
overflow:hidden;
box-shadow:
0 6px 30px rgba(0,0,0,0.15);
}

.info{
padding:18px;
}

#time{
font-size:18px;
font-weight:700;
line-height:1.1;
color:#03c75a;
margin-bottom:10px;
}

.line{
height:1px;
background:#e5e5e5;
margin-bottom:14px;
}

.address{
font-size:18px;
font-weight:700;
line-height:1.1;
margin-bottom:6px;
}

.info-row{
display:flex;
justify-content:flex-start;
align-items:center;
margin-top:2px;
font-size:16px;
font-weight:700;
line-height:1.1;
}

.value{
color:#111;
font-weight:800;
}

#map{
width:100%;
height:224px;
}

.leaflet-control-attribution{
display:none;
}

.leaflet-control-zoom{
display:none;
}

</style>
</head>

<body>

<div class="wrap">

<div class="info">

<div id="time">
시간 불러오는중...
</div>

<div class="line"></div>

<div class="address" id="address">
위치 확인중...
</div>

<div class="info-row">
<div class="value" id="distance">
<span id="temp">--°C</span>
&nbsp;&nbsp;
0.00 km
</div>
</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

//////////////////////////////////////////////////
// 현재 시간 표시

const time =
document.getElementById("time");

function updateTime(){

const now = new Date();

const days = [
'일요일',
'월요일',
'화요일',
'수요일',
'목요일',
'금요일',
'토요일'
];

time.innerHTML = `
${now.getFullYear()}년
${now.getMonth()+1}월
${now.getDate()}일
${days[now.getDay()]}
<br>
${now.toLocaleTimeString()}
`;

}

setInterval(updateTime,1000);

updateTime();

//////////////////////////////////////////////////
// Pull Key (현재 실시간 연동 키가 맞는지 꼭 확인하세요)

const pullKey = "8a7jul1r3kg4hd63";

//////////////////////////////////////////////////
// Firebase 연결

firebase.initializeApp({

apiKey:
"AIzaSyC4L8ICZbJDufxe8bimRdB5cAulPCaYVQQ",

databaseURL:
"https://rtirl-a1d7f-default-rtdb.firebaseio.com",

projectId:
"rtirl-a1d7f",

appId:
"1:684852107701:web:d77a8ed0ee5095279a61fc"

});

//////////////////////////////////////////////////

const address =
document.getElementById("address");

const tempText =
document.getElementById("temp");

const distanceText =
document.getElementById("distance");

//////////////////////////////////////////////////
// 지도 생성

const map = L.map(
'map',
{
zoomControl:false
}
).setView(
[37.5665,126.9780],
15
);

//////////////////////////////////////////////////
// 지도 타일

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

//////////////////////////////////////////////////
// 현재 위치 마커

const marker =
L.circleMarker(
[37.5665,126.9780],
{
radius:10,
color:'#fff',
weight:4,
fillColor:'#2A7FFF',
fillOpacity:1
}
).addTo(map);

//////////////////////////////////////////////////
// 이동 경로

const path = [];

const polyline =
L.polyline(
path,
{
color:'#2A7FFF',
weight:5,
opacity:0.9
}
).addTo(map);

//////////////////////////////////////////////////
// 총 주행거리 계산

let totalDistance = 0;
let prevLatLng = null;

function calculateDistance(lat1,lng1,lat2,lng2){

const R = 6371;

const dLat =
(lat2-lat1) * Math.PI/180;

const dLng =
(lng2-lng1) * Math.PI/180;

const a =
Math.sin(dLat/2) *
Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLng/2) *
Math.sin(dLng/2);

const c =
2 * Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

//////////////////////////////////////////////////
// 주소 + 실제 온도 가져오기 (보정 버전)

async function updateAddress(lat,lng){

try{

const res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&accept-language=ko&lat=${lat}&lon=${lng}`
);

const data = await res.json();
const addr = data.address || {};

// 행정구역 추출
let siDo = addr.province || addr.state || '';
let siGunGu = addr.city_district || addr.borough || addr.county || '';

if (!siDo && addr.city && (addr.city.endsWith('도') || addr.city.includes('특별') || addr.city.includes('광역'))) {
    siDo = addr.city;
} else if (addr.city && !siGunGu) {
    siGunGu = addr.city;
}

// 동/읍/면 후보군 검사하여 가장 구체적인 첫 번째 값만 추출
const dongCandidates = [
    addr.suburb, 
    addr.quarter, 
    addr.neighbourhood, 
    addr.town, 
    addr.village
];

// 유효한 첫 번째 동 정보 선택
let dong = dongCandidates.find(item => item !== undefined && item !== '') || '';

let fullAddress = '';

if (siDo) fullAddress += siDo + ' ';
if (siGunGu && !fullAddress.includes(siGunGu)) fullAddress += siGunGu + ' ';

// 만약 추출된 동 이름이 시군구 이름에 이미 포함되어 있지 않을 때만 결합
if (dong && !fullAddress.includes(dong) && !siGunGu.includes(dong)) {
    fullAddress += dong;
}

fullAddress = fullAddress.trim();

// 광명시 유실 강제 보정 코드
if (fullAddress.startsWith('경기도') && !fullAddress.includes('광명시')) {
    fullAddress = fullAddress.replace('경기도', '경기도 광명시');
}

// [추가 보정] '철산2동 광명동'처럼 동 이름이 다중으로 중복 표기되는 현상 방지
// 최종 주소에서 '~동'으로 끝나는 단어가 2개 이상 발견되면 뒤쪽의 중복 패턴을 정리합니다.
const tokens = fullAddress.split(' ');
const filteredTokens = [];
let baseDongFound = false;

for (let token of tokens) {
    if (token.endsWith('동') || token.endsWith('읍') || token.endsWith('면')) {
        if (!baseDongFound) {
            filteredTokens.push(token);
            baseDongFound = true; // 첫 번째 동(예: 철산2동)만 살립니다.
        }
    } else {
        filteredTokens.push(token);
    }
}
fullAddress = filteredTokens.join(' ');

if (!fullAddress) {
    fullAddress = data.display_name ? data.display_name.split(',')[0] : '위치 정보 없음';
}

address.innerHTML = fullAddress;

// 날씨 정보
const weatherRes = await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m`
);
const weatherData = await weatherRes.json();
const temp = weatherData.current.temperature_2m;

tempText.innerHTML = `${temp}°C`;

}catch(e){
console.error("주소/날씨 가져오기 실패:", e);
address.innerHTML = '주소 확인 실패';
}

}

//////////////////////////////////////////////////
// RTIRL 실시간 수신 (디버깅 코드 추가 및 경로 유연화)

console.log("Firebase 수신 대기 시작... PullKey:", pullKey);

firebase.database()
.ref()
.child("pullables")
.child(pullKey)
.on("value", async(snapshot)=>{

    const data = snapshot.val();
    
    // 데이터 수신 여부 확인을 위한 로그
    console.log("Firebase 데이터 수신 테스트:", data);

    if(!data) {
        console.warn("해당 PullKey로 조회된 데이터가 전혀 없습니다. Key값을 확인하세요.");
        return;
    }

    // 구조 유연화: data 바로 아래에 있거나 data.location 아래에 있는 구조 모두 방어
    const location = data.location || data;

    if(!location || !location.latitude || !location.longitude){
        console.warn("데이터는 존재하나 내부에 latitude, longitude 좌표 정보가 없습니다.", location);
        return;
    }

    const lat = location.latitude;
    const lng = location.longitude;
    
    console.log(`좌표 수신 성공 -> Lat: ${lat}, Lng: ${lng}`);

    //////////////////////////////////////////////////
    // 지도 및 마커 이동
    map.flyTo([lat,lng], 15, {animate:true, duration:1.5});
    marker.setLatLng([lat,lng]);

    // 경로 및 거리 계산
    path.push([lat,lng]);
    polyline.setLatLngs(path);

    if(prevLatLng){
        const dist = calculateDistance(prevLatLng.lat, prevLatLng.lng, lat, lng);
        totalDistance += dist;
        distanceText.innerHTML = `<span id="temp">${tempText.innerHTML}</span>&nbsp;&nbsp;${totalDistance.toFixed(2)} km`;
    }

    prevLatLng = { lat, lng };

    // 주소 갱신
    await updateAddress(lat, lng);

}, (error) => {
    console.error("Firebase 연결 에러 발생:", error);
});

</script>

</body>
</html>
