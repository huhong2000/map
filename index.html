<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RTIRL 실시간 위치</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:transparent;
font-family:sans-serif;
}

#map{
width:100vw;
height:100vh;
}

.overlay{

position:fixed;

left:20px;
top:20px;

width:320px;

padding:18px;

border-radius:24px;

background:
rgba(255,255,255,0.82);

backdrop-filter:blur(12px);

-webkit-backdrop-filter:
blur(12px);

box-shadow:
0 6px 30px rgba(0,0,0,0.18);

z-index:9999;

}

#time{

font-size:15px;
font-weight:700;

line-height:1.6;

color:#03c75a;

margin-bottom:14px;

}

.line{

height:1px;

background:#ddd;

margin-bottom:16px;

}

.title{
font-size:24px;
font-weight:800;
margin-bottom:10px;
}

.address{
font-size:18px;
font-weight:700;
margin-top:10px;
}

.status{
margin-top:12px;
font-size:14px;
color:#03c75a;
font-weight:700;
}

.leaflet-control-attribution{
display:none;
}

.leaflet-control-zoom{
display:none;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="overlay">

<div id="time">
시간 불러오는중...
</div>

<div class="line"></div>

<div class="title">
📍 실시간 위치
</div>

<div class="address" id="address">
RTIRL 연결중...
</div>

<div class="status" id="status">
대기중...
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

//////////////////////////////////////////////////
// 현재 시간 표시

const time =
document.getElementById("time");

function updateTime(){

const now = new Date();

const days = [
'일요일',
'월요일',
'화요일',
'수요일',
'목요일',
'금요일',
'토요일'
];

time.innerHTML = `
${now.getFullYear()}년
${now.getMonth()+1}월
${now.getDate()}일
${days[now.getDay()]}
<br>
${now.toLocaleTimeString()}
`;

}

setInterval(updateTime,1000);

updateTime();

//////////////////////////////////////////////////
// 네 Pull Key

const pullKey =
"8a7jul1r3kg4hd63";

//////////////////////////////////////////////////
// Firebase RTIRL 연결

firebase.initializeApp({

apiKey:
"AIzaSyC4L8ICZbJDufxe8bimRdB5cAulPCaYVQQ",

databaseURL:
"https://rtirl-a1d7f-default-rtdb.firebaseio.com",

projectId:
"rtirl-a1d7f",

appId:
"1:684852107701:web:d77a8ed0ee5095279a61fc"

});

//////////////////////////////////////////////////

const address =
document.getElementById("address");

const statusText =
document.getElementById("status");

//////////////////////////////////////////////////
// 지도 생성

const map = L.map(
'map',
{
zoomControl:false
}
).setView(
[37.5665,126.9780],
16
);

//////////////////////////////////////////////////
// 지도 타일

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

//////////////////////////////////////////////////
// 위치 마커

const marker =
L.circleMarker(
[37.5665,126.9780],
{
radius:10,
color:'#fff',
weight:4,
fillColor:'#2A7FFF',
fillOpacity:1
}
).addTo(map);

//////////////////////////////////////////////////
// 이동 경로

const path = [];

const polyline =
L.polyline(
path,
{
color:'#2A7FFF',
weight:5,
opacity:0.8
}
).addTo(map);

//////////////////////////////////////////////////
// 주소 가져오기

async function updateAddress(lat,lng){

try{

const res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
);

const data =
await res.json();

const city =
data.address.city ||
data.address.town ||
data.address.county ||
'서울';

const suburb =
data.address.suburb ||
data.address.neighbourhood ||
'';

address.innerHTML =
`${city} ${suburb}`;

}catch(e){

address.innerHTML =
'주소 확인 실패';

}

}

//////////////////////////////////////////////////
// RTIRL 실시간 수신

firebase.database()
.ref()
.child("pullables")
.child(pullKey)
.child("location")
.on("value", async(snapshot)=>{

const location =
snapshot.val();

if(!location){

statusText.innerHTML =
"위치 데이터 없음";

return;

}

const lat =
location.latitude;

const lng =
location.longitude;

//////////////////////////////////////////////////

statusText.innerHTML =
"실시간 연결됨";

//////////////////////////////////////////////////

map.flyTo(
[lat,lng],
17,
{
animate:true,
duration:1.5
}
);

marker.setLatLng(
[lat,lng]
);

//////////////////////////////////////////////////
// 이동경로

path.push([lat,lng]);

polyline.setLatLngs(path);

//////////////////////////////////////////////////

await updateAddress(
lat,
lng
);

});

</script>

</body>
</html>
