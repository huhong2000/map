<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RTIRL 실시간 위치</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

<style>

html,body{
margin:0;
padding:0;
background:#f5f5f5;
font-family:sans-serif;
}

.wrap{
width:340px;
margin:20px auto;
background:#fff;
border-radius:24px;
overflow:hidden;
box-shadow:
0 6px 30px rgba(0,0,0,0.15);
}

.info{
padding:18px;
}

#time{
font-size:15px;
font-weight:700;
line-height:1.45;
color:#03c75a;
margin-bottom:10px;
}

.line{
height:1px;
background:#e5e5e5;
margin-bottom:14px;
}

.address{
font-size:18px;
font-weight:800;
line-height:1.25;
}

.info-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:8px;
font-size:16px;
font-weight:700;
line-height:1.2;
}

.label{
color:#222;
}

.value{
color:#111;
font-weight:800;
}

#map{
width:100%;
height:320px;
}

.leaflet-control-attribution{
display:none;
}

.leaflet-control-zoom{
display:none;
}

</style>
</head>

<body>

<div class="wrap">

<div class="info">

<div id="time">
시간 불러오는중...
</div>

<div class="line"></div>

<div class="address" id="address">
📍 현재위치 확인중...
</div>

<div class="info-row">
<div class="label">현재기온</div>
<div class="value" id="temp">광명시</div>
</div>

<div class="info-row">
<div class="label">주행거리</div>
<div class="value" id="distance">0.0 km</div>
</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

//////////////////////////////////////////////////
// 현재 시간 표시

const time =
document.getElementById("time");

function updateTime(){

const now = new Date();

const days = [
'일요일',
'월요일',
'화요일',
'수요일',
'목요일',
'금요일',
'토요일'
];

time.innerHTML = `
${now.getFullYear()}년
${now.getMonth()+1}월
${now.getDate()}일
${days[now.getDay()]}
<br>
${now.toLocaleTimeString()}
`;

}

setInterval(updateTime,1000);

updateTime();

//////////////////////////////////////////////////
// Pull Key

const pullKey =
"8a7jul1r3kg4hd63";

//////////////////////////////////////////////////
// Firebase 연결

firebase.initializeApp({

apiKey:
"AIzaSyC4L8ICZbJDufxe8bimRdB5cAulPCaYVQQ",

databaseURL:
"https://rtirl-a1d7f-default-rtdb.firebaseio.com",

projectId:
"rtirl-a1d7f",

appId:
"1:684852107701:web:d77a8ed0ee5095279a61fc"

});

//////////////////////////////////////////////////

const address =
document.getElementById("address");

const tempText =
document.getElementById("temp");

const distanceText =
document.getElementById("distance");

//////////////////////////////////////////////////
// 지도 생성

const map = L.map(
'map',
{
zoomControl:false
}
).setView(
[37.5665,126.9780],
16
);

//////////////////////////////////////////////////
// 지도 타일

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

//////////////////////////////////////////////////
// 현재 위치 마커

const marker =
L.circleMarker(
[37.5665,126.9780],
{
radius:10,
color:'#fff',
weight:4,
fillColor:'#2A7FFF',
fillOpacity:1
}
).addTo(map);

//////////////////////////////////////////////////
// 이동 경로

const path = [];

const polyline =
L.polyline(
path,
{
color:'#2A7FFF',
weight:5,
opacity:0.9
}
).addTo(map);

//////////////////////////////////////////////////
// 총 주행거리 계산

let totalDistance = 0;
let prevLatLng = null;

function calculateDistance(lat1,lng1,lat2,lng2){

const R = 6371;

const dLat =
(lat2-lat1) * Math.PI/180;

const dLng =
(lng2-lng1) * Math.PI/180;

const a =
Math.sin(dLat/2) *
Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLng/2) *
Math.sin(dLng/2);

const c =
2 * Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

//////////////////////////////////////////////////
// 주소 가져오기

async function updateAddress(lat,lng){

try{

const res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
);

const data =
await res.json();

const city =
data.address.city ||
data.address.town ||
data.address.county ||
'서울특별시';

const suburb =
data.address.suburb ||
data.address.neighbourhood ||
'';

address.innerHTML =
`📍 현재위치 ${city}<br>${suburb}`;

tempText.innerHTML =
city;

}catch(e){

address.innerHTML =
'📍 주소 확인 실패';

}

}

//////////////////////////////////////////////////
// RTIRL 실시간 수신

firebase.database()
.ref()
.child("pullables")
.child(pullKey)
.child("location")
.on("value", async(snapshot)=>{

const location =
snapshot.val();

if(!location){
return;
}

const lat =
location.latitude;

const lng =
location.longitude;

//////////////////////////////////////////////////
// 지도 이동

map.flyTo(
[lat,lng],
17,
{
animate:true,
duration:1.5
}
);

//////////////////////////////////////////////////
// 현재 위치 마커 이동

marker.setLatLng(
[lat,lng]
);

//////////////////////////////////////////////////
// 이동 경로

path.push([lat,lng]);

polyline.setLatLngs(path);

//////////////////////////////////////////////////
// 주행거리 계산

if(prevLatLng){

const dist =
calculateDistance(
prevLatLng.lat,
prevLatLng.lng,
lat,
lng
);

totalDistance += dist;

distanceText.innerHTML =
totalDistance.toFixed(2) + " km";

}

prevLatLng = {
lat,
lng
};

//////////////////////////////////////////////////

await updateAddress(
lat,
lng
);

});

</script>

</body>
</html>
