# index.html

```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>실시간 위치 지도</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:transparent;
}

.panel{

position:absolute;

left:15px;
bottom:15px;

width:320px;

background:rgba(255,255,255,0.78);

color:#111;

padding:15px;

border-radius:18px;

z-index:999;

backdrop-filter:blur(10px);

box-shadow:0 4px 20px rgba(0,0,0,0.2);

}

#time{

font-size:16px;
font-weight:bold;

color:#03c75a;

margin-bottom:12px;

line-height:1.5;

}

.title{

font-size:24px;
font-weight:bold;
margin-bottom:10px;

}

.addr{

font-size:20px;
line-height:1.4;
margin-bottom:10px;

}

#map{

width:100%;
height:220px;

border-radius:12px;

}

</style>
</head>

<body>

<div class="panel">

<div id="time"></div>

<div class="title">
📍 현재 위치
</div>

<div class="addr" id="addr">
위치 확인중...
</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const addr = document.getElementById("addr");

const time = document.getElementById("time");

function updateTime(){

const now = new Date();

const days = [
'일요일',
'월요일',
'화요일',
'수요일',
'목요일',
'금요일',
'토요일'
];

const year =
now.getFullYear();

const month =
now.getMonth()+1;

const date =
now.getDate();

const day =
days[now.getDay()];

const clock =
now.toLocaleTimeString();

time.innerHTML =
`${year}년 ${month}월 ${date}일 ${day}
<br>
${clock}`;

}

setInterval(updateTime,1000);

updateTime();

const map =
L.map('map').setView(
[37.5665,126.9780],
15
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

const marker =
L.marker(
[37.5665,126.9780]
).addTo(map);

navigator.geolocation.watchPosition(

async(pos)=>{

const lat =
pos.coords.latitude;

const lng =
pos.coords.longitude;

map.setView([lat,lng],17);

marker.setLatLng([lat,lng]);

const res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
);

const data =
await res.json();

addr.innerHTML =

(data.address.suburb || "") +
"<br>" +

(data.address.road || "");

},

()=>{

addr.innerHTML =
"위치 권한 허용 필요";

},

{
enableHighAccuracy:true
}

);

</script>

</body>
</html>
```
