<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RTIRL 실시간 위치</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

<style>

html,body{
margin:0;
padding:0;
background:#f5f5f5;
font-family:sans-serif;
}

.wrap{
width:340px;
margin:20px auto;
background:#fff;
border-radius:24px;
overflow:hidden;
box-shadow:
0 6px 30px rgba(0,0,0,0.15);
}

.info{
padding:18px;
}

#time{
font-size:20px;
font-weight:800;
line-height:1.1;
color:#03c75a;
margin-bottom:10px;
}

.line{
height:1px;
background:#e5e5e5;
margin-bottom:14px;
}

.address{
font-size:22px;
font-weight:800;
line-height:1.1;
margin-bottom:6px;
}

.info-row{
display:flex;
justify-content:flex-start;
align-items:center;
margin-top:2px;
font-size:16px;
font-weight:700;
line-height:1.1;
}

.value{
color:#111;
font-weight:800;
}

#map{
width:100%;
height:224px;
}

.leaflet-control-attribution{
display:none;
}

.leaflet-control-zoom{
display:none;
}

</style>
</head>

<body>

<div class="wrap">

<div class="info">

<div id="time">
시간 불러오는중...
</div>

<div class="line"></div>

<div class="address" id="address">
위치 확인중...
</div>

<div class="info-row">
<div class="value" id="distance">
<span id="temp">--°C</span>
&nbsp;&nbsp;
0.00 km
</div>
</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

//////////////////////////////////////////////////
// 현재 시간 표시

const time =
document.getElementById("time");

function updateTime(){

const now = new Date();

const days = [
'일요일',
'월요일',
'화요일',
'수요일',
'목요일',
'금요일',
'토요일'
];

time.innerHTML = `
${now.getFullYear()}년
${now.getMonth()+1}월
${now.getDate()}일
${days[now.getDay()]}
<br>
${now.toLocaleTimeString()}
`;

}

setInterval(updateTime,1000);

updateTime();

//////////////////////////////////////////////////
// Pull Key

const pullKey =
"8a7jul1r3kg4hd63";

//////////////////////////////////////////////////
// Firebase 연결

firebase.initializeApp({

apiKey:
"AIzaSyC4L8ICZbJDufxe8bimRdB5cAulPCaYVQQ",

databaseURL:
"https://rtirl-a1d7f-default-rtdb.firebaseio.com",

projectId:
"rtirl-a1d7f",

appId:
"1:684852107701:web:d77a8ed0ee5095279a61fc"

});

//////////////////////////////////////////////////

const address =
document.getElementById("address");

const tempText =
document.getElementById("temp");

const distanceText =
document.getElementById("distance");

//////////////////////////////////////////////////
// 지도 생성

const map = L.map(
'map',
{
zoomControl:false
}
).setView(
[37.5665,126.9780],
15
);

//////////////////////////////////////////////////
// 지도 타일

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

//////////////////////////////////////////////////
// 현재 위치 마커

const marker =
L.circleMarker(
[37.5665,126.9780],
{
radius:10,
color:'#fff',
weight:4,
fillColor:'#2A7FFF',
fillOpacity:1
}
).addTo(map);

//////////////////////////////////////////////////
// 이동 경로

const path = [];

const polyline =
L.polyline(
path,
{
color:'#2A7FFF',
weight:5,
opacity:0.9
}
).addTo(map);

//////////////////////////////////////////////////
// 총 주행거리 계산

let totalDistance = 0;
let prevLatLng = null;

function calculateDistance(lat1,lng1,lat2,lng2){

const R = 6371;

const dLat =
(lat2-lat1) * Math.PI/180;

const dLng =
(lng2-lng1) * Math.PI/180;

const a =
Math.sin(dLat/2) *
Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLng/2) *
Math.sin(dLng/2);

const c =
2 * Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

//////////////////////////////////////////////////
// 주소 + 실제 온도 가져오기 (수정된 로직)

async function updateAddress(lat,lng){

try{

//////////////////////////////////////////////////
// 주소 수신

const res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&accept-language=ko&lat=${lat}&lon=${lng}`
);

const data =
await res.json();

const addr =
data.address || {};

//////////////////////////////////////////////////
// 한국 행정구역 맞춤 정밀 파싱

// 1. 시/도 (경기도, 서울특별시 등)
let siDo = addr.province || addr.state || '';

// 2. 시/군/구 (광명시, 강남구 등)
let siGunGu = addr.city_district || addr.borough || addr.county || '';

// 해외 API 특성 보정 예외 처리
if (!siDo && addr.city && (addr.city.endsWith('도') || addr.city.includes('특별') || addr.city.includes('광역'))) {
    siDo = addr.city;
} else if (addr.city && !siGunGu) {
    siGunGu = addr.city;
}

// 3. 읍/면/동/리 (철산동, 광명동 등 후보군 우선순위 추출)
const dongCandidates = [
    addr.suburb, 
    addr.quarter, 
    addr.neighbourhood, 
    addr.town, 
    addr.village
];
let dong = dongCandidates.find(item => item !== undefined && item !== '') || '';

//////////////////////////////////////////////////
// 자연스러운 주소 결합 및 중복 제거

let fullAddress = '';

// [시/도] 결합
if (siDo) fullAddress += siDo + ' ';

// [시/군/구] 결합 (시/도 명칭과 겹치지 않을 때만)
if (siGunGu && !fullAddress.includes(siGunGu)) {
    fullAddress += siGunGu + ' ';
}

// [읍/면/동] 결합 (중복 방지 필터링)
if (dong) {
    // 철산2동과 광명동이 둘 다 잡히거나 중복 표기되는 것을 막기 위해 조건 검사
    if (!fullAddress.includes(dong) && !siGunGu.includes(dong)) {
        // 이미 주소창에 다른 '동' 이름이 들어가 있다면 추가하지 않음 (첫 번째 매칭된 동만 인정)
        const hasDong = fullAddress.includes('동 ') || fullAddress.includes('읍 ') || fullAddress.includes('면 ');
        if (!hasDong) {
            fullAddress += dong;
        }
    }
}

// 혹시 모를 데이터 누락 시 기본값 방어 코드
if (!fullAddress.trim()) {
    fullAddress = data.display_name ? data.display_name.split(',')[0] : '위치 정보 없음';
}

//////////////////////////////////////////////////
// 주소 표시

address.innerHTML = fullAddress.trim();

//////////////////////////////////////////////////
// 실제 온도 가져오기

const weatherRes = await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m`
);

const weatherData =
await weatherRes.json();

const temp =
weatherData.current.temperature_2m;

tempText.innerHTML =
`${temp}°C`;

}catch(e){

address.innerHTML =
'주소 확인 실패';

}

}

//////////////////////////////////////////////////
// RTIRL 실시간 수신

firebase.database()
.ref()
.child("pullables")
.child(pullKey)
.child("location")
.on("value", async(snapshot)=>{

const location =
snapshot.val();

if(!location){
return;
}

const lat =
location.latitude;

const lng =
location.longitude;

//////////////////////////////////////////////////
// 지도 이동

map.flyTo(
[lat,lng],
15,
{
animate:true,
duration:1.5
}
);

//////////////////////////////////////////////////
// 현재 위치 마커 이동

marker.setLatLng(
[lat,lng]
);

//////////////////////////////////////////////////
// 이동 경로

path.push([lat,lng]);

polyline.setLatLngs(path);

//////////////////////////////////////////////////
// 주행거리 계산

if(prevLatLng){

const dist =
calculateDistance(
prevLatLng.lat,
prevLatLng.lng,
lat,
lng
);

totalDistance += dist;

distanceText.innerHTML =
`<span id="temp">${tempText.innerHTML}</span>&nbsp;&nbsp;${totalDistance.toFixed(2)} km`;

}

prevLatLng = {
lat,
lng
};

//////////////////////////////////////////////////

await updateAddress(
lat,
lng
);

});

</script>

</body>
</html>
