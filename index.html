<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>RTIRL 네이버 스타일 위치 오버레이</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
overflow:hidden;
background:transparent;

font-family:
-apple-system,
BlinkMacSystemFont,
'Segoe UI',
sans-serif;
}

#map{
position:fixed;
left:0;
top:0;
width:100vw;
height:100vh;
z-index:1;
}

.overlay{

position:fixed;

left:20px;
top:20px;

width:340px;

padding:20px;

border-radius:28px;

background:
rgba(255,255,255,0.82);

backdrop-filter:blur(14px);

-webkit-backdrop-filter:
blur(14px);

box-shadow:
0 8px 30px rgba(0,0,0,0.2);

border:
1px solid rgba(255,255,255,0.4);

z-index:9999;

}

#time{

font-size:15px;
font-weight:700;

line-height:1.6;

color:#03c75a;

margin-bottom:16px;

}

.line{

height:1px;

background:#ddd;

margin-bottom:18px;

}

.title{

display:flex;
align-items:center;

font-size:20px;
font-weight:800;

color:#111;

margin-bottom:12px;

}

.icon{

font-size:28px;

margin-right:8px;

color:#03c75a;

}

.address{

font-size:24px;
font-weight:800;

line-height:1.4;

color:#111;

margin-bottom:18px;

}

.status{

font-size:14px;
font-weight:700;

color:#666;

margin-top:12px;

}

#miniMap{

width:100%;
height:250px;

border-radius:20px;

overflow:hidden;

}

.leaflet-control-attribution{
display:none;
}

.leaflet-control-zoom{
display:none;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="overlay">

<div id="time">
시간 불러오는중...
</div>

<div class="line"></div>

<div class="title">
<div class="icon">📍</div>
현재 위치
</div>

<div
class="address"
id="address"
>
위치 연결중...
</div>

<div id="miniMap"></div>

<div class="status" id="status">
RTIRL 연결중...
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

//////////////////////////////////////////////////
// RTIRL 설정

const PULL_KEY =
"8a7jul1r3kg4hd63";

//////////////////////////////////////////////////

const address =
document.getElementById("address");

const time =
document.getElementById("time");

const statusText =
document.getElementById("status");

//////////////////////////////////////////////////
// 시간

function updateTime(){

const now = new Date();

const days = [
'일요일',
'월요일',
'화요일',
'수요일',
'목요일',
'금요일',
'토요일'
];

time.innerHTML = `
${now.getFullYear()}년
${now.getMonth()+1}월
${now.getDate()}일
${days[now.getDay()]}
<br>
${now.toLocaleTimeString()}
`;

}

setInterval(updateTime,1000);

updateTime();

//////////////////////////////////////////////////
// 지도

const map = L.map(
'miniMap',
{
zoomControl:false
}
).setView(
[37.5665,126.9780],
16
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

//////////////////////////////////////////////////
// 현재 위치 점

const marker = L.circleMarker(
[37.5665,126.9780],
{
radius:10,
color:'#fff',
weight:4,
fillColor:'#2A7FFF',
fillOpacity:1
}
).addTo(map);

//////////////////////////////////////////////////
// 이동 경로

const path = [];

const polyline = L.polyline(
path,
{
color:'#2A7FFF',
weight:5,
opacity:0.8
}
).addTo(map);

//////////////////////////////////////////////////
// 주소 가져오기

let addressTimer = null;

async function updateAddress(lat,lng){

try{

const res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
);

const data =
await res.json();

const city =
data.address.city ||
data.address.town ||
data.address.county ||
'서울';

const suburb =
data.address.suburb ||
data.address.neighbourhood ||
'';

address.innerHTML =
`${city} ${suburb}`;

}catch(e){

address.innerHTML =
'주소 확인 실패';

}

}

//////////////////////////////////////////////////
// RTIRL 데이터 불러오기

async function fetchRTIRL(){

try{

statusText.innerHTML =
'RTIRL 연결됨';

const res = await fetch(
`https://rtirl.com/api/last/${PULL_KEY}`
);

const data =
await res.json();

if(
!data ||
!data.latitude ||
!data.longitude
){
return;
}

const lat =
parseFloat(data.latitude);

const lng =
parseFloat(data.longitude);

//////////////////////////////////////////////////

map.flyTo(
[lat,lng],
17,
{
animate:true,
duration:1.5
}
);

marker.setLatLng(
[lat,lng]
);

//////////////////////////////////////////////////
// 이동경로

path.push([lat,lng]);

polyline.setLatLngs(path);

//////////////////////////////////////////////////
// 주소 업데이트

clearTimeout(addressTimer);

addressTimer =
setTimeout(()=>{

updateAddress(lat,lng);

},1000);

}catch(e){

statusText.innerHTML =
'RTIRL 연결 실패';

}

}

//////////////////////////////////////////////////
// 2초마다 위치 갱신

setInterval(fetchRTIRL,2000);

fetchRTIRL();

</script>

</body>
</html>
